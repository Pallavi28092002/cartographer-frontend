<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Cartographer</title>
  </head>
  <body class="app-page" data-nav="false">
    <div class="auth-layout">
      <a href="/" class="auth-brand">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5L15.5 5.25V12.75L9 16.5L2.5 12.75V5.25L9 1.5Z" stroke="currentColor" stroke-width="1.5"/></svg>
        </div>
        <div>
          <div class="brand-title">Cartographer</div>
          <div class="brand-subtitle">Narrative World-Building Tool</div>
        </div>
      </a>
      <div class="form-card">
        <h1 class="form-card__title">Sign In</h1>
        <p class="form-card__subtitle">Welcome back to your worlds.</p>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" />
        <a href="/world-graph.html" class="btn btn-primary btn-block">Sign In</a>
        <p class="form-card__footer">No account? <a href="/create-account.html">Create one</a></p>
      </div>
    </div>
    <script type="module">
      import './src/styles/base.css';
      import './src/styles/components.css';
      import './src/styles/app-pages.css';
    </script>
  </body>
</html>
