<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — Cartographer</title>
    <script type="module" crossorigin src="/assets/components-CF9NXYT0.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/components-C_eyxXLi.css">
    <link rel="stylesheet" crossorigin href="/assets/app-pages-D7CUtDEX.css">
  </head>
  <body class="app-page" data-nav="false">
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--green-white)">
      <a href="/" style="display:flex;align-items:center;gap:12px;margin-bottom:32px">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5L15.5 5.25V12.75L9 16.5L2.5 12.75V5.25L9 1.5Z" stroke="currentColor" stroke-width="1.5"/></svg></div>
        <div><div class="brand-title">Cartographer</div><div class="brand-subtitle">Narrative World-Building Tool</div></div>
      </a>
      <div class="form-card">
        <h1 style="font-family:var(--font-serif);font-size:24px;margin-bottom:8px;text-align:center">Create Account</h1>
        <p style="font-size:13px;color:var(--xanadu);text-align:center;margin-bottom:24px">Start building your narrative universe.</p>
        <label for="name">Full Name</label>
        <input id="name" type="text" placeholder="Your name" />
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" />
        <a href="/world-creation.html" class="btn btn-primary" style="display:block;text-align:center;padding:12px;background:var(--everglade);color:white;border-radius:var(--radius-lg)">Create Account</a>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--xanadu)">Already have an account? <a href="/sign-in.html" style="color:var(--everglade);font-weight:500">Sign in</a></p>
      </div>
    </div>
  </body>
</html>
